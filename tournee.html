<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#F5C21A">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tournée 🍬">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-512.png">
<title>Tournée – La Nougaterie du Pont d'Arc</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
:root{
  --gold:#F5C21A;--gold-dk:#DBA10E;--gold-lt:#FFF8DC;
  --black:#1A1A1A;--grey:#6B6B6B;--grey-lt:#D0CFC9;
  --cream:#F7F6F2;--white:#FFFFFF;
  --green:#27AE60;--green-lt:#E8F8EF;
  --red:#E53935;--red-lt:#FFEBEE;
  --orange:#E8870A;--orange-lt:#FFF3E0;
  --blue:#2563EB;--purple:#7B1FA2;--purple-lt:#F3E5F5;
  --nav-h:66px;--hdr-h:56px;
  --radius:16px;--radius-sm:10px;
  --shadow:0 2px 12px rgba(0,0,0,0.10);
  --shadow-lg:0 4px 24px rgba(0,0,0,0.15);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',sans-serif;background:var(--cream);color:var(--black);min-height:100vh;overflow-x:hidden}
h1,h2,h3{font-family:'Montserrat',sans-serif}
a{text-decoration:none;color:inherit}
button{font-family:'Inter',sans-serif;cursor:pointer}
input,textarea,select{font-family:'Inter',sans-serif}

#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
#app-header{background:var(--black);color:var(--white);height:var(--hdr-h);padding:0 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,0.3);z-index:50}
#hdr-back{background:none;border:none;color:var(--white);font-size:22px;line-height:1;padding:4px 8px 4px 0;display:none}
#hdr-title{flex:1;font-family:'Montserrat',sans-serif;font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#hdr-pill{background:var(--gold);color:var(--black);font-family:'Montserrat',sans-serif;font-weight:700;font-size:10px;padding:3px 10px;border-radius:20px;white-space:nowrap}
#app-body{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--nav-h)+8px)}
#app-body.no-nav{padding-bottom:0}

#bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:var(--white);border-top:1px solid #e5e5e5;display:flex;align-items:stretch;box-shadow:0 -2px 12px rgba(0,0,0,0.08);z-index:100}
#bottom-nav.hidden{display:none}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;color:var(--grey);padding:6px 4px;transition:.15s}
.nav-item.active{color:var(--gold-dk)}
.nav-item .nav-icon{font-size:22px;line-height:1}
.nav-item .nav-label{font-family:'Montserrat',sans-serif;font-size:9px;font-weight:700}

.screen{display:none}
.screen.active{display:block}
#screen-login.active{display:flex;flex-direction:column;min-height:100vh}

.card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.section-title{font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;color:var(--grey);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.pad{padding:16px}
.gap{display:flex;flex-direction:column;gap:12px}

.btn-primary{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;background:var(--gold);color:var(--black);border:none;border-radius:var(--radius-sm);font-family:'Montserrat',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:.15s}
.btn-primary:hover{background:var(--gold-dk)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-secondary{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;background:var(--white);color:var(--black);border:2px solid var(--black);border-radius:var(--radius-sm);font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:.15s}
.btn-pdf{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;background:var(--purple);color:var(--white);border:none;border-radius:var(--radius-sm);font-family:'Montserrat',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:.15s}
.btn-pdf:hover{background:#6A1B9A}
.btn-maps{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 14px;background:#4285F4;color:var(--white);border:none;border-radius:var(--radius-sm);font-family:'Montserrat',sans-serif;font-size:12px;font-weight:700;cursor:pointer;text-decoration:none}
.btn-maps.green{background:#34A853}

.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600}
.badge-distribue{background:var(--green-lt);color:var(--green)}
.badge-ferme{background:#ECEFF1;color:var(--grey)}
.badge-refus{background:var(--red-lt);color:var(--red)}
.badge-absent{background:var(--orange-lt);color:var(--orange)}
.badge-a_faire{background:var(--gold-lt);color:var(--gold-dk)}
.badge-planifiee{background:var(--gold-lt);color:var(--gold-dk)}
.badge-en_cours{background:#E3F2FD;color:#1565C0}
.badge-terminee{background:var(--green-lt);color:var(--green)}

.form-group{margin-bottom:14px}
.form-label{display:block;font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;color:var(--grey);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}
.form-input{width:100%;padding:12px 14px;border:1.5px solid #E5E5E5;border-radius:var(--radius-sm);font-size:14px;outline:none;background:var(--white);transition:.15s;color:var(--black)}
.form-input:focus{border-color:var(--gold)}
textarea.form-input{resize:vertical;min-height:60px}

.status-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.stat-btn{padding:12px 8px;border:2px solid #E5E5E5;border-radius:var(--radius-sm);font-family:'Montserrat',sans-serif;font-size:12px;font-weight:700;text-align:center;background:var(--white);color:var(--grey);cursor:pointer;transition:.15s;display:flex;flex-direction:column;align-items:center;gap:4px}
.stat-btn span.icon{font-size:20px}
.stat-btn.sel-distribue{border-color:var(--green);background:var(--green-lt);color:var(--green)}
.stat-btn.sel-ferme{border-color:var(--grey);background:#ECEFF1;color:var(--grey)}
.stat-btn.sel-refus{border-color:var(--red);background:var(--red-lt);color:var(--red)}
.stat-btn.sel-absent{border-color:var(--orange);background:var(--orange-lt);color:var(--orange)}

.prog-bg{background:#E5E5E5;border-radius:4px;height:6px;overflow:hidden}
.prog-fill{background:var(--gold);height:6px;border-radius:4px;transition:width .4s}
.prog-fill.full{background:var(--green)}

#toast{position:fixed;bottom:calc(var(--nav-h)+12px);left:50%;transform:translateX(-50%);background:rgba(26,26,26,0.92);color:var(--white);padding:10px 20px;border-radius:20px;font-size:12px;font-weight:600;z-index:500;opacity:0;pointer-events:none;white-space:nowrap;transition:opacity .25s}
#toast.show{opacity:1}

/* LOGIN */
.login-hero{background:#F7F6F2;padding:48px 24px 36px;text-align:center;color:var(--black);flex-shrink:0}
.login-logo{margin-bottom:12px}
.login-logo img{max-width:220px;width:80%;height:auto}
.login-brand{font-family:'Montserrat',sans-serif;font-size:20px;font-weight:800;color:var(--black);line-height:1.25}
.login-sub{font-size:13px;color:var(--grey);margin-top:8px}
.login-form{padding:24px 20px 40px;display:flex;flex-direction:column;gap:14px;flex:1}
.login-error{background:var(--red-lt);color:var(--red);padding:10px 14px;border-radius:var(--radius-sm);font-size:13px;display:none}
.login-error.show{display:block}

/* ACCUEIL */
#screen-accueil{padding:16px}
.hero-card{background:var(--black);color:var(--white);border-radius:var(--radius);padding:20px;margin-bottom:16px;box-shadow:var(--shadow-lg)}
.hero-greeting{font-size:12px;color:var(--grey-lt);margin-bottom:3px}
.hero-name{font-family:'Montserrat',sans-serif;font-size:20px;font-weight:800;margin-bottom:14px}
.hero-stats{display:flex;gap:10px}
.hero-stat{flex:1;background:rgba(255,255,255,0.08);border-radius:var(--radius-sm);padding:10px;text-align:center}
.hero-stat .val{font-family:'Montserrat',sans-serif;font-size:22px;font-weight:800;color:var(--gold);line-height:1}
.hero-stat .lbl{font-size:10px;color:var(--grey-lt);margin-top:3px}

.tournee-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:15px;margin-bottom:10px;cursor:pointer;transition:.15s;border-left:4px solid transparent;display:flex;align-items:center;gap:12px}
.tournee-card:hover{box-shadow:var(--shadow-lg)}
.tournee-card.sp{border-left-color:var(--gold)}
.tournee-card.ec{border-left-color:#1565C0}
.tournee-card.te{border-left-color:var(--green)}
.tc-icon{width:44px;height:44px;border-radius:var(--radius-sm);background:var(--gold-lt);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.tc-info{flex:1;min-width:0}
.tc-name{font-family:'Montserrat',sans-serif;font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tc-meta{font-size:11px;color:var(--grey);margin-top:3px}

/* TOURNÉE DÉTAIL */
#screen-tournee{padding:16px}
.progress-band{background:var(--white);border-radius:var(--radius);padding:14px;margin-bottom:12px;box-shadow:var(--shadow)}
.pb-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.pb-title{font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700}
.pb-pct{font-family:'Montserrat',sans-serif;font-size:13px;font-weight:800;color:var(--gold-dk)}
.pb-counts{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap}
.pb-count{font-size:11px;color:var(--grey);display:flex;align-items:center;gap:4px}
.pb-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

.stop-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:10px;overflow:hidden;border-left:4px solid #E5E5E5;transition:.2s}
.stop-card.s-distribue{border-left-color:var(--green)}
.stop-card.s-refus{border-left-color:var(--red)}
.stop-card.s-ferme{border-left-color:var(--grey-lt)}
.stop-card.s-absent{border-left-color:var(--orange)}
.stop-hdr{padding:12px 13px;cursor:pointer;display:flex;align-items:center;gap:10px}
.stop-num{width:30px;height:30px;border-radius:50%;background:var(--cream);color:var(--grey);font-family:'Montserrat',sans-serif;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.2s}
.stop-card.s-distribue .stop-num{background:var(--green);color:var(--white)}
.stop-card.s-refus .stop-num{background:var(--red);color:var(--white)}
.stop-card.s-ferme .stop-num{background:#B0BEC5;color:var(--white)}
.stop-card.s-absent .stop-num{background:var(--orange);color:var(--white)}
.stop-info{flex:1;min-width:0}
.stop-name{font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stop-addr{font-size:10px;color:var(--grey);margin-top:2px}
.stop-chev{color:var(--grey);font-size:16px;transition:transform .2s;flex-shrink:0}
.stop-card.expanded .stop-chev{transform:rotate(180deg)}
.stop-body{display:none;padding:13px;border-top:1px solid #F0EFE9}
.stop-card.expanded .stop-body{display:block}

/* VALIDATION */
#screen-validation{padding:16px}

/* FICHE */
#screen-fiche{padding:0}
.fiche-hero{background:var(--black);padding:20px 16px 24px;color:var(--white)}
.fiche-icon-big{font-size:42px;margin-bottom:8px}
.fiche-nom{font-family:'Montserrat',sans-serif;font-size:20px;font-weight:800}
.fiche-sous{font-size:13px;color:var(--grey-lt);margin-top:4px}
.fiche-info-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid #F0EFE9;font-size:13px}
.fiche-info-icon{font-size:16px;flex-shrink:0;width:22px;text-align:center;margin-top:1px}

/* LIEUX */
#screen-lieux{padding:16px}
.search-box{position:relative;margin-bottom:12px}
.search-box input{width:100%;padding:12px 14px 12px 38px;border:none;border-radius:var(--radius-sm);font-size:13px;background:var(--white);box-shadow:var(--shadow);outline:none}
.search-box::before{content:'🔍';position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px}
.lieu-item{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:10px;padding:13px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:.15s}
.lieu-item:hover{box-shadow:var(--shadow-lg)}
.lieu-icon-box{width:44px;height:44px;border-radius:var(--radius-sm);background:var(--gold-lt);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}

/* PROFIL */
#screen-profil{padding:16px}
.profile-card{background:var(--black);color:var(--white);border-radius:var(--radius);padding:20px;margin-bottom:16px;display:flex;align-items:center;gap:14px}
.profile-avatar{width:52px;height:52px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-family:'Montserrat',sans-serif;font-size:18px;font-weight:800;color:var(--black);flex-shrink:0}
.menu-list{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:16px}
.menu-item{display:flex;align-items:center;gap:12px;padding:15px 16px;border-bottom:1px solid #F0EFE9;cursor:pointer;transition:.15s}
.menu-item:last-child{border-bottom:none}
.menu-item:hover{background:var(--cream)}
.menu-icon{font-size:20px;width:28px;text-align:center;flex-shrink:0}

/* HISTORIQUE TIMELINE */
.ht-item{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid #F0EFE9}
.ht-item:last-child{border-bottom:none}
.ht-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;margin-top:3px;border:2px solid white}
.ht-content{flex:1;min-width:0}
.ht-date{font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;color:var(--black);margin-bottom:4px;text-transform:capitalize}
.ht-statut{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-bottom:4px}
.ht-meta{font-size:11px;color:var(--grey);display:flex;gap:10px;flex-wrap:wrap;margin-bottom:4px}
.ht-comment{font-size:12px;color:var(--black);background:var(--cream);border-radius:8px;padding:7px 10px;margin-top:6px;line-height:1.5}
.ht-photo{width:80px;height:80px;border-radius:8px;object-fit:cover;cursor:pointer;margin-top:8px;display:block}

/* Stats fiche */
.fiche-stats{display:flex;gap:8px;margin:14px 0 4px}
.fiche-stat-tile{flex:1;background:var(--cream);border-radius:var(--radius-sm);padding:10px 6px;text-align:center}
.fiche-stat-tile .sv{font-family:'Montserrat',sans-serif;font-size:18px;font-weight:800;line-height:1}
.fiche-stat-tile .sl{font-size:9px;color:var(--grey);margin-top:2px}

/* Photo grid */
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:16px}
.photo-grid img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px;cursor:pointer;display:block}

/* Photo lightbox */
.photo-lb{position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px}
.photo-lb img{max-width:95vw;max-height:80vh;border-radius:8px;object-fit:contain}
.photo-lb-cap{color:rgba(255,255,255,.7);font-size:12px}
.photo-lb-close{position:absolute;top:14px;right:16px;color:#fff;font-size:28px;cursor:pointer;line-height:1;font-weight:300}

/* Historique inline (validation) */
.hist-toggle{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:10px 0;border-top:1px solid #F0EFE9;margin-top:12px}
.hist-toggle-lbl{font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;color:var(--grey);text-transform:uppercase;letter-spacing:.4px}
.hist-body-wrap{display:none;margin-top:8px}
.hist-body-wrap.open{display:block}
.hist-item{background:var(--cream);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:8px}
.hist-top{display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap}
.hist-date{font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;color:var(--white);background:var(--black);padding:2px 8px;border-radius:20px;flex-shrink:0}
.hist-body{font-size:12px;color:var(--grey);display:flex;gap:10px;flex-wrap:wrap}

/* UTILS */
.spinner{width:32px;height:32px;border:3px solid var(--gold-lt);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-sc{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:200px;gap:12px;color:var(--grey);font-size:13px}
.empty-sc{text-align:center;padding:40px 20px}
.empty-sc .ei{font-size:48px;margin-bottom:12px}
.empty-sc .et{font-family:'Montserrat',sans-serif;font-size:16px;font-weight:700;margin-bottom:6px}
.empty-sc .es{font-size:13px;color:var(--grey);line-height:1.6}

.photo-area{border:2px dashed #E5E5E5;border-radius:var(--radius-sm);padding:18px;text-align:center;cursor:pointer;margin-bottom:12px;transition:.15s;background:var(--cream);position:relative}
.photo-area:hover{border-color:var(--gold)}
.photo-area input{display:none}
.photo-preview{width:100%;max-height:200px;border-radius:var(--radius-sm);object-fit:cover;margin-top:10px;display:block}

.btn-nougat-val{width:100%;padding:11px;background:#f5f5f5;border:2px solid #ddd;border-radius:var(--radius-sm);font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700;color:#888;cursor:pointer;margin-bottom:12px;transition:.15s}
.btn-nougat-val.active{background:#FFF3DC;border-color:#E8A020;color:#C07800}
.btn-entree.active{background:#E8F0FE;border-color:#1A73E8;color:#1A73E8}
.vf-row{display:flex;gap:6px;overflow-x:auto;padding:8px 16px 4px;scrollbar-width:none}
.vf-row::-webkit-scrollbar{display:none}
.vchip{padding:6px 14px;border-radius:16px;border:1px solid #ddd;background:#f5f5f5;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:'Montserrat',sans-serif}
.vchip.active{background:var(--purple);color:#fff;border-color:var(--purple)}
.vf-date-range{display:none;padding:0 16px 8px;gap:8px;align-items:center}
.vf-date-range.show{display:flex}
.vf-date-range input{flex:1;padding:7px;border:1px solid #ddd;border-radius:8px;font-size:12px}
.btn-export-pdf{display:none;margin:4px 16px 8px;padding:11px;background:#1565C0;color:#fff;border:none;border-radius:var(--radius-sm);font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700;cursor:pointer;width:calc(100% - 32px)}
.btn-export-pdf.show{display:block}
#screen-pointage-libre{padding:0;flex-direction:column;height:100%;overflow:hidden}
#screen-pointage-libre.active{display:flex}
/* Browsable list */
.pl-browse-item{display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:1px solid #f0f0f0;background:#fff}
.pl-browse-name{flex:1;font-family:'Montserrat',sans-serif;font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pl-browse-sub{font-size:10px;color:var(--grey)}
.btn-pl-add{width:34px;height:34px;background:var(--purple);color:#fff;border:none;border-radius:50%;font-size:20px;font-weight:300;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;line-height:1}
.btn-pl-add.added{background:#27AE60;font-size:15px}
/* Bottom sheet */
#pl-sheet-overlay{display:none;position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);z-index:50;flex-direction:column;justify-content:flex-end}
#pl-sheet-overlay.open{display:flex}

#pl-sheet-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:8px}
#pl-sheet-footer{flex-shrink:0;padding:10px 16px 20px;background:#fff;border-top:1px solid #f0f0f0}
.pl-sheet-handle{width:36px;height:4px;background:#ddd;border-radius:2px;margin:10px auto 14px}

.pl-sheet-sub{font-size:11px;color:var(--grey);padding:0 16px 12px;border-bottom:1px solid #f0f0f0;margin-bottom:12px}
.pl-sheet-label{font-size:10px;font-weight:700;color:var(--grey);text-transform:uppercase;letter-spacing:.5px;padding:0 16px;margin-bottom:6px}
.pl-statut-row{display:flex;gap:6px;padding:0 16px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px}
.pl-statut-pill{padding:7px 14px;border-radius:20px;font-size:12px;font-weight:700;border:1.5px solid #ddd;cursor:pointer;white-space:nowrap;background:#f5f5f5;color:#888;flex-shrink:0}
.pl-statut-pill.active{border-color:currentColor}
.pl-statut-pill[data-s="distribue"].active{background:#E8F5E9;border-color:#27AE60;color:#27AE60}
.pl-statut-pill[data-s="ferme"].active{background:#FFEBEE;border-color:#E53935;color:#E53935}
.pl-statut-pill[data-s="refus"].active{background:#FFF3E0;border-color:#E8A020;color:#E8A020}
.pl-statut-pill[data-s="absent"].active{background:#F3E5F5;border-color:#8E24AA;color:#8E24AA}
.pl-qty-row{display:flex;gap:8px;padding:0 16px;margin-bottom:14px}
.pl-qty-box{flex:1}
.pl-qty-box label{font-size:10px;color:var(--grey);display:block;margin-bottom:4px}
.pl-qty-box select{width:100%;padding:8px 10px;border:1.5px solid #ddd;border-radius:8px;font-size:13px;font-family:inherit;background:#f9f9f9}
.pl-toggle-row{display:flex;gap:8px;padding:0 16px;margin-bottom:12px}
.pl-toggle-btn{flex:1;padding:9px 6px;border:1.5px solid #ddd;border-radius:8px;font-size:12px;font-weight:700;background:#f5f5f5;color:#888;cursor:pointer;text-align:center}
.pl-toggle-btn.active{background:#FFF3DC;border-color:#E8A020;color:#C07800}
.pl-toggle-btn.entree.active{background:#E8F0FE;border-color:#1A73E8;color:#1A73E8}
#pl-sheet-comment{width:100%;box-sizing:border-box;margin:0 0 12px;padding:9px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:13px;font-family:inherit;resize:none;height:56px;display:block}
.pl-sheet-validate{width:100%;padding:14px;background:var(--gold);border:none;border-radius:12px;font-family:'Montserrat',sans-serif;font-size:14px;font-weight:700;cursor:pointer;display:block}
/* Bottom bar */
#pl-bar{background:#fff;padding:12px 16px;border-top:1px solid #eee;box-shadow:0 -2px 8px rgba(0,0,0,.08);flex-shrink:0}
#pl-date-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:12px;font-weight:700}
#pl-date-row input{flex:1;padding:7px;border:1px solid #ddd;border-radius:6px;font-size:12px}
#pl-send-btn{display:none;width:100%;padding:13px;background:var(--purple);color:#fff;border:none;border-radius:10px;font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700;cursor:pointer;margin-top:8px}
</style>
</head>
<body>
<div id="app">

  <div id="app-header">
    <button id="hdr-back" onclick="handleBack()">&#8592;</button>
    <div id="hdr-title">La Nougaterie du Pont d'Arc</div>
    <div id="hdr-pill">Terrain</div>
  </div>

  <div id="app-body" class="no-nav">

    <!-- LOGIN -->
    <div id="screen-login" class="screen active">
      <div class="login-hero">
        <div class="login-logo"><img src="logo_transparent.png" alt="Nougaterie du Pont d'Arc"></div>
      </div>
      <div class="login-form">
        <div class="login-error" id="login-error"></div>
        <div class="form-group">
          <label class="form-label">Email</label>

        </div>

    <!-- ACCUEIL -->

      <div class="pad gap">
        <div class="hero-card">
          <div class="hero-greeting">Bonjour 👋</div>
          <div class="hero-name" id="hero-name">…</div>
          <div class="hero-stats">
            <div class="hero-stat"><div class="val" id="h-actives">—</div><div class="lbl">Tournées actives</div></div>
            <div class="hero-stat"><div class="val" id="h-flyers">—</div><div class="lbl">Flyers ce mois</div></div>
            <div class="hero-stat"><div class="val" id="h-taux">—</div><div class="lbl">Taux réussite</div></div>
          </div>

    <!-- VALIDATION ARRÊT -->
    <div id="screen-validation" class="screen">
      <div id="validation-content"></div>
    </div>

    <!-- FICHE LIEU -->
    <div id="screen-fiche" class="screen">

    <!-- LIEUX -->

    <!-- POINTAGE LIBRE -->
    <div id="screen-pointage-libre" class="screen" style="position:relative">
      <div style="padding:10px 12px 6px;flex-shrink:0">
        <input id="pl-search" type="search" placeholder="🔍 Rechercher un lieu..." oninput="filterPL()"
          style="width:100%;box-sizing:border-box;padding:9px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;outline:none">
      </div>
      <div id="pl-browse" style="overflow-y:auto;flex:1;min-height:0"></div>
      <div id="pl-bar">
        <div id="pl-date-row">
          <span>Date de visite</span>

        </div>
        <button id="pl-send-btn" onclick="submitPointageLibre()">Envoyer</button>
      </div>
      <!-- BOTTOM SHEET -->
      <div id="pl-sheet-overlay" onclick="if(event.target===this)closePLSheet()">
        <div id="pl-sheet">
          <div id="pl-sheet-body">
            <div class="pl-sheet-handle"></div>
            <div class="pl-sheet-title" id="pl-sheet-title"></div>
            <div class="pl-sheet-sub" id="pl-sheet-sub"></div>
            <div class="pl-sheet-label">Statut</div>
            <div class="pl-statut-row">
              <div class="pl-statut-pill active" data-s="distribue" onclick="setPLStatut('distribue')">Distribué</div>
              <div class="pl-statut-pill" data-s="ferme" onclick="setPLStatut('ferme')">Fermé</div>

              <button class="pl-toggle-btn entree" id="pl-sheet-entree" onclick="this.classList.toggle('active')">🎟️ Entrée offerte</button>

    <!-- NOTES TERRAIN -->
    <div id="screen-notes" class="screen" style="padding:16px">
      <div class="card pad" style="margin-bottom:14px">
        <div class="section-title">📝 Nouvelle note</div>
        <p style="font-size:12px;color:var(--grey);margin:0 0 10px">Lieu à ajouter, remarque sur un secteur, retour terrain…</p>
        <textarea id="note-texte" placeholder="Décris le lieu : nom, adresse, type d'établissement, contact si possible..." style="width:100%;min-height:120px;border:1.5px solid #E0DDD5;border-radius:10px;padding:10px;font-size:14px;font-family:inherit;resize:vertical;box-sizing:border-box"></textarea>
        <button onclick="submitNote()" style="margin-top:10px;width:100%;padding:13px;background:var(--gold);border:none;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit">Envoyer la note</button>
      </div>
      <div id="notes-sent-list"></div>
    </div>

    <!-- PROFIL -->
    <div id="screen-profil" class="screen">
      <div id="profil-content"></div>
    </div>

  </div>

  <nav id="bottom-nav" class="hidden">
    <button class="nav-item" onclick="navTo('accueil')" id="nav-accueil">
      <span class="nav-icon">🗺️</span><span class="nav-label">Tournées</span>
    </button>
    <button class="nav-item" onclick="navTo('lieux')" id="nav-lieux">
      <span class="nav-icon">📍</span><span class="nav-label">Lieux</span>
    </button>

      <span class="nav-icon">✅</span><span class="nav-label">Pointage</span>
    </button>
    <button class="nav-item" onclick="navTo('notes')" id="nav-notes">
      <span class="nav-icon">📝</span><span class="nav-label">Notes</span>
    </button>
    <button class="nav-item" onclick="navTo('profil')" id="nav-profil">
      <span class="nav-icon">👤</span><span class="nav-label">Profil</span>
    </button>
  </nav>
</div>

<div id="toast"></div>

<script>
// ════════════════════════════════════════════
//  SERVICE WORKER (PWA)
// ════════════════════════════════════════════
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}

// ════════════════════════════════════════════
//  SUPABASE
// ════════════════════════════════════════════
const SUPA_URL = 'https://krbzipnoeroaofojccri.supabase.co';
const SUPA_KEY = 'sb_publishable_00DghQOW-_toZkmmA2uEkA_8yd9xNSP';

function getStoredSession(){try{const r=localStorage.getItem('sb-krbzipnoeroaofojccri-auth-token');return r?JSON.parse(r):null;}catch(e){return null;}}
function getToken(){const s=getStoredSession();return s?.access_token||SUPA_KEY;}
async function refreshSession(){const s=getStoredSession();if(!s?.refresh_token)return false;try{const d=await sbAuthPost('token?grant_type=refresh_token',{refresh_token:s.refresh_token});localStorage.setItem('sb-krbzipnoeroaofojccri-auth-token',JSON.stringify(d));return true;}catch(e){return false;}}
async function sbFetch(url,opts){let r=await fetch(url,opts);if(r.status===401){const ok=await refreshSession();if(ok){opts.headers['Authorization']='Bearer '+getToken();r=await fetch(url,opts);}else{localStorage.removeItem('sb-krbzipnoeroaofojccri-auth-token');navTo('login');throw new Error('Session expirée, reconnectez-vous');}}if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.message||'HTTP '+r.status);}return r.json();}
async function sbGet(path){return sbFetch(`${SUPA_URL}/rest/v1/${path}`,{headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+getToken()}});}
async function sbPost(table,data){return sbFetch(`${SUPA_URL}/rest/v1/${table}`,{method:'POST',headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+getToken(),'Content-Type':'application/json','Prefer':'return=representation'},body:JSON.stringify(data)});}
async function sbPatch(table,filter,data){return sbFetch(`${SUPA_URL}/rest/v1/${table}?${filter}`,{method:'PATCH',headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+getToken(),'Content-Type':'application/json'},body:JSON.stringify(data)});}
async function sbAuthPost(endpoint,body,token){const h={'apikey':SUPA_KEY,'Content-Type':'application/json'};if(token)h['Authorization']='Bearer '+token;const r=await fetch(`${SUPA_URL}/auth/v1/${endpoint}`,{method:'POST',headers:h,body:JSON.stringify(body)});if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.message||e.error_description||'HTTP '+r.status);}return r.json();}

// ════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════
const ST = {
  screen: 'login',
  user: null,
  profile: null,
  tournees: [],
  activeTournee: null,
  activePoints: [],
  allLieux: [],
  activeFiche: null,
  ficheFrom: 'lieux',
  geoPos: null,
  rtChannel: null,
  form: { pointId:null, statut:null, flyers:1, flyersChateau:1, commentaire:'', photoB64:null, photoFile:null, nougat:false, entreeGratuite:false }
};

// ════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', async () => {
  tryGeo();
  document.getElementById('login-pwd').addEventListener('keydown', e => { if (e.key==='Enter') doLogin(); });
  const stored = getStoredSession();
  if (stored?.user) await onLoggedIn(stored.user);
});

// ════════════════════════════════════════════
//  GEO
// ════════════════════════════════════════════
function tryGeo() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(
    p => { ST.geoPos = { lat: p.coords.latitude, lon: p.coords.longitude }; },
    null, { timeout: 8000 }
  );
}

function refreshGeo() {
  return new Promise(resolve => {
    if (!navigator.geolocation) return resolve(ST.geoPos);
    navigator.geolocation.getCurrentPosition(
      p => { ST.geoPos = { lat: p.coords.latitude, lon: p.coords.longitude }; resolve(ST.geoPos); },
      () => resolve(ST.geoPos),
      { timeout: 8000, maximumAge: 30000 }
    );
  });
}

// ════════════════════════════════════════════
//  AUTH
// ════════════════════════════════════════════
async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pwd   = document.getElementById('login-pwd').value;
  const btn   = document.getElementById('login-btn');
  const err   = document.getElementById('login-error');
  err.classList.remove('show');
  if (!email || !pwd) { err.textContent = 'Remplissez tous les champs.'; err.classList.add('show'); return; }
  btn.disabled = true; btn.textContent = 'Connexion…';
  try {
    const data = await sbAuthPost('token?grant_type=password', {email, password: pwd});
    localStorage.setItem('sb-krbzipnoeroaofojccri-auth-token', JSON.stringify(data));
    await onLoggedIn(data.user);
  } catch(e) {
    err.textContent = 'Email ou mot de passe incorrect.'; err.classList.add('show');
    btn.disabled = false; btn.textContent = 'Se connecter';
  }
}

async function onLoggedIn(user) {
  ST.user = user;
  const profArr = await sbGet(`utilisateurs?select=*&id=eq.${user.id}&limit=1`).catch(()=>[]);
  const prof = profArr[0] || null;
  ST.profile = prof;
  document.getElementById('app-body').classList.remove('no-nav');
  document.getElementById('bottom-nav').classList.remove('hidden');
  await Promise.all([ loadTournees(), loadAllLieux() ]);
  navTo('accueil');
}

async function doLogout() {
  try { await sbAuthPost('logout', {}, getToken()); } catch(e){}
  localStorage.removeItem('sb-krbzipnoeroaofojccri-auth-token');
  ST.user = null; ST.profile = null; ST.tournees = []; ST.activeTournee = null; ST.activePoints = []; ST.rtChannel = null;
  document.getElementById('app-body').classList.add('no-nav');
  document.getElementById('bottom-nav').classList.add('hidden');
  navTo('login');
}

// ════════════════════════════════════════════
//  DATA
// ════════════════════════════════════════════
async function loadTournees() {
  const data = await sbGet(`tournees?select=*&distributeur_id=eq.${ST.user.id}&order=date.desc`).catch(()=>[]);
  ST.tournees = data;
}

async function loadPoints(tourneeId) {
  const data = await sbGet(`points_tournee?select=*,lieux(*)&tournee_id=eq.${tourneeId}&order=ordre_passage.asc`).catch(()=>[]);
  ST.activePoints = data;
}

async function loadAllLieux() {
  try {
    const data = await sbGet('lieux?select=*&order=nom');
    ST.allLieux = Array.isArray(data) ? data : [];
    if (!ST.allLieux.length) toast('Aucun lieu trouvé en base');
  } catch(e) {
    ST.allLieux = [];
    toast('Erreur chargement lieux : ' + e.message);
  }
}

async function loadHistorique(lieuId) {
  const yr = new Date().getFullYear();
  const all = await sbGet(`points_tournee?select=id,statut,quantite_flyers,heure_validation,commentaire_distributeur,photo_preuve,tournees(id,nom,date,distributeur:utilisateurs(nom))&lieu_id=eq.${lieuId}&statut=neq.a_faire&heure_validation=not.is.null&order=heure_validation.desc`).catch(()=>[]);
  const annee = all.filter(p => p.heure_validation && p.heure_validation.startsWith(yr));
  return { all, annee };
}

// ════════════════════════════════════════════
//  REALTIME
// ════════════════════════════════════════════
function subscribeRealtime(tourneeId) {
  // Realtime désactivé — utilise la clé publishable incompatible avec WebSocket Supabase
}

// ════════════════════════════════════════════
//  NAVIGATION
// ════════════════════════════════════════════
const TITLES = {
  login: 'La Nougaterie du Pont d\'Arc',
  accueil: 'Mes tournées',
  tournee: 'Tournée',
  validation: "Valider l'arrêt",
  fiche: 'Fiche lieu',
  lieux: 'Lieux',
  notes: 'Notes terrain',
  profil: 'Mon profil'
};

function navTo(screen) {
  ST.screen = screen;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById('screen-' + screen);
  if (el) el.classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const ni = document.getElementById('nav-' + screen);
  if (ni) ni.classList.add('active');
  document.getElementById('hdr-title').textContent = TITLES[screen] || '';
  const hdrBack = document.getElementById('hdr-back');
  hdrBack.style.display = ['tournee','validation','fiche'].includes(screen) ? 'block' : 'none';
  document.getElementById('app-body').scrollTop = 0;

  if (screen === 'accueil')    renderAccueil();
  if (screen === 'tournee')    renderTourneeDetail();
  if (screen === 'validation') renderValidation();
  if (screen === 'fiche')      renderFiche();
  if (screen === 'lieux')      renderLieux();
  if (screen === 'pointage-libre') renderPointageLibre();
  if (screen === 'notes')      renderNotes();
  if (screen === 'profil')     renderProfil();
}

function handleBack() {
  if (ST.screen === 'fiche')      navTo(ST.ficheFrom);
  else if (ST.screen === 'validation') navTo('tournee');
  else if (ST.screen === 'tournee')    navTo('accueil');
  else navTo('accueil');
}

// ════════════════════════════════════════════
//  ACCUEIL
// ════════════════════════════════════════════
function renderAccueil() {
  const name = ST.profile?.nom || ST.user?.email?.split('@')[0] || 'Distributeur';
  document.getElementById('hero-name').textContent = name;
  const actives = ST.tournees.filter(t => t.statut === 'planifiee' || t.statut === 'en_cours').length;
  document.getElementById('h-actives').textContent = actives;
  document.getElementById('h-flyers').textContent = '…';
  document.getElementById('h-taux').textContent = '…';
  computeHeroStats();

  const cont = document.getElementById('tournees-container');
  if (!ST.tournees.length) {
    cont.innerHTML = `<div class="empty-sc"><div class="ei">🗺️</div><div class="et">Aucune tournée</div><div class="es">Votre responsable n'a pas encore créé de tournée pour vous.</div></div>`;
    return;
  }
  const sections = [
    { label: 'En cours', items: ST.tournees.filter(t => t.statut==='en_cours') },
    { label: 'À venir',  items: ST.tournees.filter(t => t.statut==='planifiee') },
    { label: 'Terminées', items: ST.tournees.filter(t => t.statut==='terminee').slice(0,5) }
  ];
  let html = '';
  sections.forEach(s => {
    if (!s.items.length) return;
    html += `<div class="section-title">${s.label}</div>`;
    html += s.items.map(tourneeCardHTML).join('');
  });
  cont.innerHTML = html;
}

async function computeHeroStats() {
  const ids = ST.tournees.map(t => t.id);
  if (!ids.length) return;
  const data = await sbGet(`points_tournee?select=statut,quantite_flyers,tournee_id&tournee_id=in.(${ids.join(',')})&statut=neq.a_faire`).catch(()=>null);
  if (!data) return;
  const mo = new Date().toISOString().slice(0,7);
  const moIds = ST.tournees.filter(t => t.date?.startsWith(mo)).map(t => t.id);
  const moFlyers = data.filter(p => moIds.includes(p.tournee_id) && p.statut==='distribue').reduce((s,p) => s+(p.quantite_flyers||0), 0);
  const ok = data.filter(p => p.statut==='distribue').length;
  const taux = data.length ? Math.round(ok/data.length*100) : 0;
  document.getElementById('h-flyers').textContent = moFlyers;
  document.getElementById('h-taux').textContent = taux+'%';
}

function renderTourneeDetail() {
  const t = ST.activeTournee; if (!t) return;
  document.getElementById('hdr-title').textContent = esc(t.nom);
  const pts = ST.activePoints;
  const total = pts.length;
  const done  = pts.filter(p => p.statut!=='a_faire').length;
  const dist  = pts.filter(p => p.statut==='distribue').length;
  const ferm  = pts.filter(p => p.statut==='ferme').length;
  const refu  = pts.filter(p => p.statut==='refus').length;
  const abs   = pts.filter(p => p.statut==='absent').length;
  const todo  = pts.filter(p => p.statut==='a_faire').length;
  const pct   = total ? Math.round(done/total*100) : 0;
  const isEnd = t.statut==='terminee' || (total>0 && done===total);

  // Google Maps URLs
  const wayPts = pts.filter(p => p.lieux?.latitude && p.lieux?.longitude);
  const nextPt = pts.find(p => p.statut==='a_faire' && p.lieux?.latitude);
  const gmFull = wayPts.length>=2
    ? 'https://www.google.com/maps/dir/'+wayPts.slice(0,25).map(p=>`${p.lieux.latitude},${p.lieux.longitude}`).join('/')
    : null;
  const gmNext = nextPt ? `https://www.google.com/maps/dir/?api=1&destination=${nextPt.lieux.latitude},${nextPt.lieux.longitude}` : null;

  let html = `
    <div class="progress-band">
      <div class="pb-top"><div class="pb-title">${esc(t.nom)}</div><div class="pb-pct">${pct}%</div></div>
      <div class="prog-bg"><div class="prog-fill${pct===100?' full':''}" style="width:${pct}%"></div></div>
      <div class="pb-counts">
        <div class="pb-count"><div class="pb-dot" style="background:var(--green)"></div>${dist} distribués</div>
        ${ferm?`<div class="pb-count"><div class="pb-dot" style="background:var(--grey)"></div>${ferm} fermés</div>`:''}
        ${refu?`<div class="pb-count"><div class="pb-dot" style="background:var(--red)"></div>${refu} refus</div>`:''}
        ${abs ?`<div class="pb-count"><div class="pb-dot" style="background:var(--orange)"></div>${abs} absents</div>`:''}
        <div class="pb-count"><div class="pb-dot" style="background:#E5E5E5;border:1px solid #ccc"></div>${todo} à faire</div>
      </div>
    </div>`;

  if (gmFull || gmNext) {
    html += `<div style="display:flex;gap:8px;margin-bottom:12px">`;
    if (gmFull) html += `<a href="${gmFull}" target="_blank" class="btn-maps" style="flex:1">🗺️ Itinéraire complet</a>`;
    if (gmNext) html += `<a href="${gmNext}" target="_blank" class="btn-maps green" style="flex:1">📍 Prochain arrêt</a>`;
    html += `</div>`;
  }

  if (isEnd) {
    html += `<button class="btn-pdf" onclick="genPDF()" style="margin-bottom:12px">📄 Éditer le récap de tournée</button>`;
  }

  html += `<div class="section-title">Arrêts (${total})</div>`;
  html += pts.length ? pts.map((p,i) => stopCardHTML(p,i)).join('') : `<div class="empty-sc"><div class="ei">📍</div><div class="et">Aucun arrêt</div></div>`;
  html += `<button class="btn-secondary" style="margin-top:12px" onclick="navTo('accueil')">← Retour aux tournées</button>`;
  document.getElementById('tournee-detail-content').innerHTML = html;
}

function setStatut(s) {
  ST.form.statut = s;
  renderValidation();
}

function handlePhoto(input) {
  const file = input.files[0]; if (!file) return;
  ST.form.photoFile = file;
  const r = new FileReader();
  r.onload = e => { ST.form.photoB64 = e.target.result; renderValidation(); };
  r.readAsDataURL(file);
}

async function submitValidation() {
  const btn = document.getElementById('valider-btn');
  if (!ST.form.statut) { toast('Choisissez un statut'); return; }
  btn.disabled = true; btn.textContent = 'Validation…';

  const geo = await refreshGeo();

  let photoUrl = ST.activePoints.find(x=>x.id===ST.form.pointId)?.photo_preuve || null;
  if (ST.form.photoFile) {
    try {
      const ext = ST.form.photoFile.name.split('.').pop()||'jpg';
      const path = `tournee_${ST.activeTournee.id}/p${ST.form.pointId}_${Date.now()}.${ext}`;
      const upR = await fetch(`${SUPA_URL}/storage/v1/object/photos-distribution/${path}`, {
        method:'POST', headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+getToken(),'Content-Type':ST.form.photoFile.type||'image/jpeg','x-upsert':'true'}, body:ST.form.photoFile
      });
      if (upR.ok) photoUrl = `${SUPA_URL}/storage/v1/object/public/photos-distribution/${path}`;
    } catch(e) {}
  }

  const commentFinal = [ST.form.nougat?'[Nougat offert]':'', ST.form.commentaire||''].filter(Boolean).join(' ')||null;
  const upd = {
    statut: ST.form.statut,
    quantite_flyers: ST.form.statut==='distribue' ? (ST.form.flyers||0) : 0,
    quantite_flyers_chateau: ST.form.statut==='distribue' ? (ST.form.flyersChateau||0) : 0,
    entree_gratuite: ST.form.entreeGratuite||false,
    commentaire_distributeur: commentFinal,
    heure_validation: new Date().toISOString(),
    latitude_validation: geo?.lat || null,
    longitude_validation: geo?.lon || null,
    photo_preuve: photoUrl
  };

  try { await sbPatch('points_tournee','id=eq.'+ST.form.pointId,upd); }
  catch(e) { toast('Erreur lors de la validation ✗'); btn.disabled=false; btn.textContent='Valider'; return; }

  const idx = ST.activePoints.findIndex(x=>x.id===ST.form.pointId);
  if (idx>=0) ST.activePoints[idx] = { ...ST.activePoints[idx], ...upd };

  const allDone = ST.activePoints.every(p => p.statut!=='a_faire');
  if (allDone && ST.activeTournee.statut!=='terminee') {
    await sbPatch('tournees','id=eq.'+ST.activeTournee.id,{statut:'terminee'}).catch(()=>{});
    ST.activeTournee.statut = 'terminee';
    const ti = ST.tournees.findIndex(t=>t.id===ST.activeTournee.id);
    if (ti>=0) ST.tournees[ti].statut = 'terminee';
    toast('🎉 Tournée terminée !', 3000);
  } else {
    if (ST.activeTournee.statut==='planifiee') {
      await sbPatch('tournees','id=eq.'+ST.activeTournee.id,{statut:'en_cours'}).catch(()=>{});
      ST.activeTournee.statut = 'en_cours';
      const ti = ST.tournees.findIndex(t=>t.id===ST.activeTournee.id);
      if (ti>=0) ST.tournees[ti].statut = 'en_cours';
    }
    toast('Arrêt validé ✓');
  }
  navTo('tournee');
}

async function loadAndRenderHistInline(lieuId, targetId) {
  const { all, annee } = await loadHistorique(lieuId);
  const el = document.getElementById(targetId); if (!el) return;
  const yr = new Date().getFullYear();
  const flyAn = annee.filter(p=>p.statut==='distribue').reduce((s,p)=>s+(p.quantite_flyers||0),0);
  el.innerHTML = `
    <div class="hist-toggle" onclick="toggleHistWrap()">
      <div class="hist-toggle-lbl">Historique · ${annee.length} visite${annee.length>1?'s':''} en ${yr}${flyAn?' · '+flyAn+' flyers':''}</div>
      <span id="hist-chev" style="font-size:16px;color:var(--grey)">▾</span>
    </div>
    <div class="hist-body-wrap" id="hist-body-wrap">
      ${histListHTML(all)}
    </div>`;
}

function histListHTML(list) {
  if (!list.length) return `<div style="color:var(--grey);font-size:13px;padding:10px 0">Aucun passage enregistré</div>`;
  return list.map(p => {
    const d = p.heure_validation ? new Date(p.heure_validation).toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'}) : (p.tournees?.date||'—');
    const slbl = { distribue:'✅ Distribué', ferme:'🔒 Fermé', refus:'🚫 Refus', absent:'👻 Absent' }[p.statut]||p.statut;
    return `<div class="hist-item">
      <div class="hist-top">
        <span class="hist-date">${d}</span>
        <span class="badge badge-${p.statut}">${slbl}</span>
      </div>
      <div class="hist-body">
        ${p.tournees?`<span>📋 ${esc(p.tournees.nom)}</span>`:''}
        ${p.statut==='distribue'&&p.quantite_flyers?`<span>🗞 ${p.quantite_flyers} flyers</span>`:''}
        ${p.commentaire_distributeur?`<span>💬 ${esc(p.commentaire_distributeur)}</span>`:''}
      </div>
    </div>`;
  }).join('');
}

function toggleHistWrap() {
  const w = document.getElementById('hist-body-wrap');
  const c = document.getElementById('hist-chev');
  if (w) { w.classList.toggle('open'); if(c) c.textContent = w.classList.contains('open') ? '▴' : '▾'; }
}

    </div>` : ''}

    <!-- Timeline -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin:14px 0 10px">
      <div class="section-title" style="margin-bottom:0">Historique</div>
      <div style="display:flex;gap:5px">
        <button id="fiche-yr-btn" onclick="ficheFilterYear(true)" style="padding:3px 9px;border:1.5px solid var(--gold);background:var(--gold);color:var(--black);border-radius:6px;font-size:10px;font-weight:700;cursor:pointer">${yr}</button>
        <button id="fiche-all-btn" onclick="ficheFilterYear(false)" style="padding:3px 9px;border:1.5px solid #E5E5E5;background:var(--white);color:var(--grey);border-radius:6px;font-size:10px;font-weight:700;cursor:pointer">Tout</button>
      </div>
    </div>
    <div id="fiche-timeline">${histTimelineHTML(annee)}</div>`;
}

function ficheFilterYear(yearOnly) {
  const list = yearOnly ? window._ficheAnnee : window._ficheAll;
  const act = 'padding:3px 9px;border:1.5px solid var(--gold);background:var(--gold);color:var(--black);border-radius:6px;font-size:10px;font-weight:700;cursor:pointer';
  const off = 'padding:3px 9px;border:1.5px solid #E5E5E5;background:var(--white);color:var(--grey);border-radius:6px;font-size:10px;font-weight:700;cursor:pointer';
  document.getElementById('fiche-yr-btn').style.cssText = yearOnly ? act : off;
  document.getElementById('fiche-all-btn').style.cssText = yearOnly ? off : act;
  document.getElementById('fiche-timeline').innerHTML = histTimelineHTML(list);
}

function histTimelineHTML(list) {
  if (!list.length) return `<div style="color:var(--grey);font-size:13px;padding:16px 0;text-align:center">Aucun passage enregistré</div>`;
  const dotC  = { distribue:'var(--green)', ferme:'var(--grey)', refus:'var(--red)', absent:'var(--orange)' };
  const bgC   = { distribue:'var(--green-lt)', ferme:'#ECEFF1', refus:'var(--red-lt)', absent:'var(--orange-lt)' };
  const txtC  = { distribue:'var(--green)', ferme:'var(--grey)', refus:'var(--red)', absent:'var(--orange)' };
  const slbls = { distribue:'✅ Distribué', ferme:'🔒 Fermé', refus:'🚫 Refus', absent:'👻 Absent' };
  return list.map(p => {
    const d = p.heure_validation ? new Date(p.heure_validation) : null;
    const dateStr = d ? d.toLocaleDateString('fr-FR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'}) : (p.tournees?.date||'—');
    const heureStr = d ? d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}) : '';
    const dist = p.tournees?.distributeur?.nom || '';
    return `<div class="ht-item">
      <div class="ht-dot" style="background:${dotC[p.statut]||'#ccc'};box-shadow:0 0 0 2px ${dotC[p.statut]||'#ccc'}"></div>
      <div class="ht-content">
        <div class="ht-date">${esc(dateStr)}${heureStr?' · '+heureStr:''}</div>
        <div>
          <span class="ht-statut" style="background:${bgC[p.statut]};color:${txtC[p.statut]}">${slbls[p.statut]||p.statut}</span>
          ${p.statut==='distribue'&&p.quantite_flyers?`<span style="font-size:10px;font-weight:600;color:var(--grey);margin-left:6px">🗞 ${p.quantite_flyers} flyers</span>`:''}
        </div>
        ${(p.tournees?.nom||dist)?`<div class="ht-meta">${p.tournees?.nom?`<span>📋 ${esc(p.tournees.nom)}</span>`:''}${dist?`<span>👤 ${esc(dist)}</span>`:''}</div>`:''}
        ${p.commentaire_distributeur?`<div class="ht-comment">💬 ${esc(p.commentaire_distributeur)}</div>`:''}
        ${p.photo_preuve?`<img src="${p.photo_preuve}" class="ht-photo" loading="lazy" onclick="openPhotoLb('${p.photo_preuve}','${esc(dateStr)}')" alt="Photo">`:''}
      </div>
    </div>`;
  }).join('');
}

function openPhotoLb(url, caption) {
  const lb = document.createElement('div');
  lb.className = 'photo-lb';
  lb.innerHTML = `<span class="photo-lb-close" onclick="this.parentElement.remove()">✕</span><img src="${url}" alt="${caption}"><div class="photo-lb-cap">${caption}</div>`;
  lb.onclick = e => { if(e.target===lb) lb.remove(); };
  document.body.appendChild(lb);
}

let visiteFilter = { mode:'tous', from:'', to:'' };
let _lieuxVisites = null; // set of lieu_id strings visited in current filter

function setVisiteFilter(mode) {
  visiteFilter.mode = mode;
  document.querySelectorAll('.vchip').forEach((b,i) => {
    b.classList.toggle('active', ['tous','jour','semaine','mois','perso'][i]===mode);
  });
  const range = document.getElementById('vf-range');
  if (range) range.classList.toggle('show', mode==='perso');
  const pdf = document.getElementById('btn-export-pdf');
  if (pdf) pdf.classList.toggle('show', true);
  if (mode==='tous') { _lieuxVisites=null; filterLieux(); return; }
  loadVisitesFiltered();
}

async function loadVisitesFiltered() {
  const now = new Date();
  let from, to = now.toISOString();
  const m = visiteFilter.mode;
  if (m==='jour') { const d=new Date(); d.setHours(0,0,0,0); from=d.toISOString(); }
  else if (m==='semaine') { const d=new Date(); d.setDate(d.getDate()-d.getDay()); d.setHours(0,0,0,0); from=d.toISOString(); }
  else if (m==='mois') { from=new Date(now.getFullYear(),now.getMonth(),1).toISOString(); }
  else if (m==='perso') {
    from = document.getElementById('vf-from')?.value ? new Date(document.getElementById('vf-from').value).toISOString() : null;
    const toVal = document.getElementById('vf-to')?.value;
    to = toVal ? new Date(toVal+'T23:59:59').toISOString() : to;
  }
  let q = 'points_tournee?select=lieu_id&statut=neq.a_faire&heure_validation=not.is.null';
  if (from) q += '&heure_validation=gte.'+encodeURIComponent(from);
  if (to)   q += '&heure_validation=lte.'+encodeURIComponent(to);
  const data = await sbGet(q).catch(()=>[]);
  _lieuxVisites = new Set(data.map(r => String(r.lieu_id)));
  filterLieux();
}


async function exportListePDF() {
  const m = visiteFilter.mode;
  let items = ST.allLieux;
  if (_lieuxVisites) items = items.filter(l => _lieuxVisites.has(String(l.id)));
  const labels = {tous:'Tous',jour:"Aujourd'hui",semaine:'Cette semaine',mois:'Ce mois',perso:'Personnalise'};
  const rows = items.map(l => `<tr><td>${esc(l.nom||'')}</td><td>${esc(l.categorie||'')}</td><td>${esc(l.ville||'')}</td></tr>`).join('');
  const html = `<!DOCTYPE html><html><head><meta charset="utf-8"><title>Lieux visites</title>
  <style>body{font-family:Arial,sans-serif;font-size:12px;padding:20px}h2{color:#8E24AA}
  table{width:100%;border-collapse:collapse;margin-top:16px}th{background:#8E24AA;color:#fff;padding:8px;text-align:left}
  td{padding:7px 8px;border-bottom:1px solid #eee}tr:nth-child(even){background:#f9f9f9}
  @media print{button{display:none}}</style></head><body>
  <h2>Lieux visites — ${labels[m]||m}</h2>
  <p>Extrait le ${new Date().toLocaleDateString('fr-FR')} — ${items.length} lieu(x)</p>
  <button onclick="window.print()" style="background:#8E24AA;color:#fff;border:none;padding:8px 16px;border-radius:5px;cursor:pointer;margin-bottom:12px">Imprimer / PDF</button>
  <table><thead><tr><th>Lieu</th><th>Categorie</th><th>Commune</th></tr></thead><tbody>${rows}</tbody></table>
  </body></html>`;
  const w = window.open('','_blank'); w.document.write(html); w.document.close();
}

let plSelected = {}; // id -> {statut,qty,nougat,note}
let plAllLieux = [];

async function renderPointageLibre() {
  const dateEl = document.getElementById('pl-date');
  if (dateEl && !dateEl.value) dateEl.value = new Date().toISOString().slice(0,10);
  if (!ST.allLieux.length) await loadAllLieux();
  plSelected = {};
  plAllLieux = ST.allLieux.slice().sort((a,b)=>(a.nom||'').localeCompare(b.nom||''));
  const searchEl = document.getElementById('pl-search');
  if (searchEl) searchEl.value = '';
  renderPLBrowse([]);
  updatePLSendBar();
}

let plBrowseLimit = 5;

function filterPL() {
  plBrowseLimit = 5;
  const q = (document.getElementById('pl-search')?.value||'').toLowerCase().trim();
  if (!q) { renderPLBrowse([]); return; }
  const items = plAllLieux.filter(l=>l.nom?.toLowerCase().includes(q)||l.ville?.toLowerCase().includes(q)||l.categorie?.toLowerCase().includes(q));
  renderPLBrowse(items);
}

function renderPLBrowse(items) {
  const el = document.getElementById('pl-browse'); if (!el) return;
  if (!items.length) {
    const q = (document.getElementById('pl-search')?.value||'').trim();
    el.innerHTML = q
      ? '<div style="padding:20px;text-align:center;color:var(--grey);font-size:13px">Aucun résultat</div>'
      : '<div style="padding:32px 16px;text-align:center;color:var(--grey);font-size:13px">🔍 Recherche un lieu pour commencer</div>';
    return;
  }
  const visible = items.slice(0, plBrowseLimit);
  const rest = items.length - plBrowseLimit;
  el.innerHTML = visible.map(l => {
    const k = String(l.id);
    const added = !!plSelected[k];
    return `<div class="pl-browse-item">
      <div style="flex:1;min-width:0">
        <div class="pl-browse-name">${esc(l.nom||'—')}</div>
        <div class="pl-browse-sub">${esc(l.categorie||'')}${l.ville?' · '+esc(l.ville):''}</div>
      </div>
      <button class="btn-pl-add${added?' added':''}" id="pladd-${k}" onclick="${added?'removePL':'openPLSheet'}('${k}')">
        ${added?'✓':'+'}
      </button>
    </div>`;
  }).join('')
  + (rest > 0 ? `<div onclick="plBrowseLimit+=5;filterPL()" style="padding:12px;text-align:center;font-size:13px;font-weight:700;color:var(--purple);cursor:pointer;border-top:1px solid #f0f0f0">Voir ${rest} résultat${rest>1?'s':'} de plus ↓</div>` : '');
}

let plSheetK = null;

function openPLSheet(k) {
  plSheetK = k;
  const l = plAllLieux.find(x=>String(x.id)===k)||{};
  const prev = (plSelected[k] && typeof plSelected[k]==='object') ? plSelected[k] : {};
  document.getElementById('pl-sheet-title').textContent = l.nom||'—';
  document.getElementById('pl-sheet-sub').textContent = (l.categorie||'')+(l.ville?' · '+l.ville:'');
  document.getElementById('pl-sheet-qty').value = prev.qty||1;
  document.getElementById('pl-sheet-qtych').value = prev.qtyChateau||1;
  const nBtn = document.getElementById('pl-sheet-nougat');
  const eBtn = document.getElementById('pl-sheet-entree');
  prev.nougat ? nBtn.classList.add('active') : nBtn.classList.remove('active');
  prev.entree ? eBtn.classList.add('active') : eBtn.classList.remove('active');
  document.getElementById('pl-sheet-comment').value = prev.comment||'';
  setPLStatut(prev.statut||'distribue');
  document.getElementById('pl-sheet-overlay').classList.add('open');
}

function closePLSheet() {
  plSheetK = null;
  document.getElementById('pl-sheet-overlay').classList.remove('open');
}

function setPLStatut(s) {
  document.querySelectorAll('.pl-statut-pill').forEach(p => {
    p.classList.toggle('active', p.dataset.s===s);
  });
}

function validatePLSheet() {
  const k = plSheetK; if (!k) return;
  const statut = document.querySelector('.pl-statut-pill.active')?.dataset.s||'distribue';
  const qty = parseInt(document.getElementById('pl-sheet-qty').value)||1;
  const qtyChateau = parseInt(document.getElementById('pl-sheet-qtych').value)||1;
  const nougat = document.getElementById('pl-sheet-nougat').classList.contains('active');
  const entree = document.getElementById('pl-sheet-entree').classList.contains('active');
  const comment = document.getElementById('pl-sheet-comment').value.trim();
  plSelected[k] = { statut, qty, qtyChateau, nougat, entree, comment };
  const btn = document.getElementById('pladd-'+k);
  if (btn) { btn.innerHTML='✓'; btn.classList.add('added'); btn.onclick=()=>removePL(k); }
  closePLSheet();
  updatePLSendBar();
}

function removePL(k) {
  delete plSelected[k];
  const btn = document.getElementById('pladd-'+k);
  if (btn) { btn.innerHTML='+'; btn.classList.remove('added'); btn.onclick=()=>openPLSheet(k); }
  updatePLSendBar();
}

function updatePLSendBar() {
  const count = Object.keys(plSelected).length;
  const btn = document.getElementById('pl-send-btn');
  if (!btn) return;
  if (count > 0) { btn.style.display='block'; btn.textContent='Envoyer '+count+' visite'+(count>1?'s':''); }
  else btn.style.display='none';
}

async function submitPointageLibre() {
  const keys = Object.keys(plSelected);
  if (!keys.length) { toast('Selectionnez au moins un lieu'); return; }
  const dateVal = document.getElementById('pl-date')?.value || new Date().toISOString().slice(0,10);
  const heure = new Date(dateVal+'T12:00:00').toISOString();
  toast('Enregistrement...');
  try {
    const nomT = 'Visite_rapide_'+dateVal;
    const existing = await sbGet('tournees?nom=eq.'+encodeURIComponent(nomT)+'&select=id').catch(()=>[]);
    let tId = existing.length ? existing[0].id : null;
    if (!tId) {
      const res = await sbPost('tournees', {nom:nomT, date:dateVal, statut:'planifiee', distributeur_id: ST.user?.id||null});
      tId = (Array.isArray(res)?res[0]:res).id;
    }
    const points = keys.map((k,i) => {
      const d = (typeof plSelected[k]==='object') ? plSelected[k] : {};
      const statut = d.statut||'distribue';
      const qty = d.qty||1;
      const qtyChateau = d.qtyChateau||1;
      const nougat = d.nougat||false;
      const entreeGratuite = d.entree||false;
      const note = d.comment||'';
      const comment = [nougat?'[Nougat offert]':'', note].filter(Boolean).join(' ')||null;
      return { tournee_id:tId, lieu_id:parseInt(k), ordre_passage:i+1,
               quantite_flyers:qty, quantite_flyers_chateau:qtyChateau,
               entree_gratuite:entreeGratuite,
               statut:statut, heure_validation:heure, commentaire_distributeur:comment };
    });
    await sbPost('points_tournee', points);
    toast(keys.length+' visite(s) enregistree(s) ✓');
    plSelected = {};
    navTo('lieux');
  } catch(e) { toast('Erreur : '+e.message); }
}

async function renderLieux() {

        <div style="font-size:11px;color:var(--grey);margin-top:2px">${esc(l.categorie||'')}${l.ville?' · '+esc(l.ville):''}</div>

//  PDF RÉCAP
// ════════════════════════════════════════════
async function genPDF() {
  const t   = ST.activeTournee;
  const pts = ST.activePoints;
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
  const W=210, M=15;
  const cBlack=[26,26,26], cGold=[245,194,26], cGrey=[107,107,107];
  const cGreen=[39,174,96], cRed=[229,57,53], cOrange=[232,135,10];

  // Header band
  doc.setFillColor(...cBlack); doc.rect(0,0,W,40,'F');
  doc.setFillColor(...cGold);  doc.rect(0,40,W,3,'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(17); doc.setTextColor(...cGold);
  doc.text('La Nougaterie du Pont d\'Arc', M, 14);
  doc.setFontSize(10); doc.setTextColor(208,207,201);
  doc.text('Récapitulatif de tournée — '+esc(t.nom), M, 22);
  const distName = ST.profile?.nom || ST.user?.email || '';
  doc.setFontSize(9);
  doc.text('Distributeur : '+distName, M, 30);
  doc.text('Généré le '+new Date().toLocaleString('fr-FR'), W-M, 30, {align:'right'});

  // Infos tournée
  let y=52;
  doc.setFont('helvetica','bold'); doc.setFontSize(13); doc.setTextColor(...cBlack);
  doc.text(t.nom, M, y); y+=6;
  doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.setTextColor(...cGrey);
  const dateStr = t.date ? new Date(t.date+'T00:00:00').toLocaleDateString('fr-FR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'}) : '—';
  doc.text('Date : '+dateStr, M, y); y+=5;
  if (t.secteur) { doc.text('Secteur : '+t.secteur, M, y); y+=5; }

  // Stat tiles
  y+=4;
  const dist  = pts.filter(p=>p.statut==='distribue');
  const ferm  = pts.filter(p=>p.statut==='ferme');
  const refu  = pts.filter(p=>p.statut==='refus');
  const abs   = pts.filter(p=>p.statut==='absent');
  const totFly= dist.reduce((s,p)=>s+(p.quantite_flyers||0),0);
  const taux  = pts.length ? Math.round(dist.length/pts.length*100) : 0;
  const stats = [
    {v:pts.length,  l:'Total arrêts', c:cBlack},
    {v:dist.length, l:'Distribués',   c:cGreen},
    {v:ferm.length, l:'Fermés',       c:cGrey},
    {v:refu.length, l:'Refus',        c:cRed},
    {v:abs.length,  l:'Absents',      c:cOrange},
    {v:totFly,      l:'Total flyers', c:cBlack},
    {v:taux+'%',    l:'Taux réussite',c:cGreen}
  ];
  const bw=(W-M*2-3*5)/4, bh=18;
  for (let i=0;i<stats.length;i++) {
    const col=i%4, row=Math.floor(i/4);
    const bx=M+col*(bw+5), by=y+row*(bh+4);
    doc.setFillColor(247,246,242); doc.roundedRect(bx,by,bw,bh,2,2,'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(13); doc.setTextColor(...stats[i].c);
    doc.text(String(stats[i].v), bx+bw/2, by+9, {align:'center'});
    doc.setFont('helvetica','normal'); doc.setFontSize(7); doc.setTextColor(...cGrey);
    doc.text(stats[i].l, bx+bw/2, by+14, {align:'center'});
  }
  y += Math.ceil(stats.length/4)*(bh+4)+8;

  // Table
  const sLbl={distribue:'Distribué',ferme:'Fermé',refus:'Refus',absent:'Absent',a_faire:'À faire'};
  const sCols={distribue:cGreen, ferme:cGrey, refus:cRed, absent:cOrange, a_faire:[180,180,180]};

  doc.autoTable({
    startY: y,
    head:[['#','Lieu','Catégorie','Statut','Flyers','Heure','Commentaire']],
    body: pts.map(p => {
      const lx=p.lieux||{};
      const hre=p.heure_validation ? new Date(p.heure_validation).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}) : '—';
      return [p.ordre_passage||'—', lx.nom||'—', lx.categorie||'—', sLbl[p.statut]||p.statut,
              p.statut==='distribue'?(p.quantite_flyers||0):'—', hre, p.commentaire_distributeur||''];
    }),
    styles:{fontSize:8,cellPadding:3},
    headStyles:{fillColor:cBlack,textColor:cGold,fontStyle:'bold',fontSize:8},
    columnStyles:{
      0:{cellWidth:8,halign:'center'},1:{cellWidth:45},2:{cellWidth:28},
      3:{cellWidth:22},4:{cellWidth:14,halign:'center'},5:{cellWidth:18,halign:'center'},6:{cellWidth:40}
    },
    didParseCell: data => {
      if (data.column.index===3 && data.section==='body') {
        const s=pts[data.row.index]?.statut;
        data.cell.styles.textColor = sCols[s]||cGrey;
        data.cell.styles.fontStyle='bold';
      }
    },
    alternateRowStyles:{fillColor:[252,251,248]},
    margin:{left:M,right:M}
  });

  // Footer
  const pages=doc.internal.getNumberOfPages();
  for (let i=1;i<=pages;i++) {
    doc.setPage(i);
    const ph=doc.internal.pageSize.height;
    doc.setFillColor(...cBlack); doc.rect(0,ph-10,W,10,'F');
    doc.setFont('helvetica','normal'); doc.setFontSize(7); doc.setTextColor(...cGold);
    doc.text('La Nougaterie du Pont d\'Arc', M, ph-4);
    doc.text(`Page ${i} / ${pages}`, W-M, ph-4, {align:'right'});
  }

  const fname=`recap_${t.nom.replace(/[^a-zA-Z0-9]/g,'_')}_${t.date||'tournee'}.pdf`;
  if (navigator.share && navigator.canShare) {
    try {
      const blob=doc.output('blob');
      const file=new File([blob],fname,{type:'application/pdf'});
      if (navigator.canShare({files:[file]})) { await navigator.share({files:[file],title:'Récap '+t.nom}); return; }
    } catch(e) {}
  }
  doc.save(fname);
  toast('PDF généré ✓');
}

// ════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtDate(d) {
  if (!d) return '—';
  try { return new Date(d+(d.includes('T')?'':'T00:00:00')).toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'}); }
  catch(e) { return d; }
}

function catIcon(cat) {
  if (!cat) return '📍';
  const c=cat.toLowerCase();
  if (c.includes('hôtel')||c.includes('hotel')) return '🏨';
  if (c.includes('camping')) return '⛺';
  if (c.includes('office')||c.includes('tourisme')) return 'ℹ️';
  if (c.includes('restaurant')||c.includes('brasserie')||c.includes('snack')) return '🍽️';
  if (c.includes('musée')||c.includes('musee')) return '🏛️';
  if (c.includes('cave')||c.includes('vin')||c.includes('domaine')) return '🍷';
  if (c.includes('boutique')||c.includes('magasin')||c.includes('commerce')) return '🛍️';
  if (c.includes('gîte')||c.includes('gite')||c.includes('chambre')) return '🏡';
  if (c.includes('sport')||c.includes('activit')||c.includes('canoe')) return '🏄';
  if (c.includes('piscine')||c.includes('aqua')) return '🏊';
  return '📍';
}

let _toastT=null;
function toast(msg,dur=2000) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(_toastT); _toastT=setTimeout(()=>el.classList.remove('show'),dur);
}
</script>
