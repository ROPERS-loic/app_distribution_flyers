<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nouveau mot de passe – Nougaterie</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#1A1A1A;display:flex;align-items:center;justify-content:center;min-height:100vh}
.card{background:#fff;border-radius:14px;padding:36px 32px;width:360px;box-shadow:0 8px 40px rgba(0,0,0,.4)}
.logo{text-align:center;margin-bottom:24px}
.logo div{font-size:44px}
.logo h2{font-family:'Arial',sans-serif;font-size:17px;font-weight:800;margin-top:8px;color:#1A1A1A}
.logo p{font-size:12px;color:#888;margin-top:4px}
label{display:block;font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px;margin-top:14px}
input{width:100%;padding:11px 13px;border:1.5px solid #E5E5E5;border-radius:8px;font-size:14px;outline:none}
input:focus{border-color:#F5C21A}
.btn{width:100%;padding:13px;background:#F5C21A;color:#1A1A1A;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;margin-top:18px}
.btn:hover{background:#DBA10E}
.btn:disabled{opacity:.5;cursor:not-allowed}
.msg{padding:10px 14px;border-radius:8px;font-size:13px;margin-top:14px;display:none}
.msg.ok{background:#E8F8EF;color:#27AE60}
.msg.err{background:#FFEBEE;color:#E53935}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div>🍯</div>
    <h2>Nougaterie du Pont d'Arc</h2>
    <p>Définir un nouveau mot de passe</p>
  </div>
  <div id="form-zone">
    <label>Nouveau mot de passe</label>
    <input type="password" id="pwd" placeholder="Min. 6 caractères">
    <label>Confirmer</label>
    <input type="password" id="pwd2" placeholder="Répéter le mot de passe">
    <button class="btn" id="btn" onclick="doReset()">Enregistrer le mot de passe</button>
  </div>
  <div class="msg" id="msg"></div>
</div>

<script>
const SUPA_URL = 'https://krbzipnoeroaofojccri.supabase.co';
const SUPA_KEY = 'sb_publishable_00DghQOW-_toZkmmA2uEkA_8yd9xNSP';
const { createClient } = supabase;
const sb = createClient(SUPA_URL, SUPA_KEY);

// Supabase envoie le token dans le fragment #access_token=...&type=recovery
window.addEventListener('load', async () => {
  const hash = window.location.hash;
  if (!hash.includes('access_token')) {
    showMsg('Lien invalide ou expiré. Demandez un nouveau lien à votre responsable.', 'err');
    document.getElementById('form-zone').style.display = 'none';
    return;
  }
  // Supabase JS v2 gère automatiquement le fragment et établit la session
  const { data, error } = await sb.auth.getSession();
  if (error || !data.session) {
    showMsg('Lien invalide ou expiré. Demandez un nouveau lien à votre responsable.', 'err');
    document.getElementById('form-zone').style.display = 'none';
  }
});

async function doReset() {
  const pwd  = document.getElementById('pwd').value;
  const pwd2 = document.getElementById('pwd2').value;
  const btn  = document.getElementById('btn');
  if (!pwd || pwd.length < 6) { showMsg('Mot de passe trop court (min. 6 caractères)', 'err'); return; }
  if (pwd !== pwd2) { showMsg('Les mots de passe ne correspondent pas', 'err'); return; }
  btn.disabled = true; btn.textContent = '⏳ Enregistrement…';
  const { error } = await sb.auth.updateUser({ password: pwd });
  if (error) {
    showMsg('Erreur : ' + error.message, 'err');
    btn.disabled = false; btn.textContent = 'Enregistrer le mot de passe';
    return;
  }
  showMsg('✅ Mot de passe mis à jour ! Vous pouvez fermer cette page et vous connecter sur l\'app.', 'ok');
  document.getElementById('form-zone').style.display = 'none';
}

function showMsg(txt, type) {
  const el = document.getElementById('msg');
  el.textContent = txt; el.className = 'msg ' + type; el.style.display = 'block';
}
</script>
</body>
</html>
